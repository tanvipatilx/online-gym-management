<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TitanFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow+Condensed:ital,wght@0,400;0,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main:    #0a0c10;
            --bg-card:    #111418;
            --bg-card2:   #161b22;
            --accent:     #39ff14;
            --accent-dim: rgba(57,255,20,0.18);
            --accent-glow:rgba(57,255,20,0.30);
            --red:        #e63946;
            --red-glow:   rgba(230,57,70,0.25);
            --text:       #f0f2f5;
            --muted:      #5a6478;
            --border:     #1e2330;
            --input-bg:   #0d0f14;
            --topbar-h:   42px;
            --navbar-h:   60px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-main);
            color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ══════════════════════════════
           TOP UTILITY BAR
        ══════════════════════════════ */
        #utility-bar {
            height: var(--topbar-h);
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .utility-left {
            font-family: 'Oswald', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .utility-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .utility-right a {
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .utility-right a:hover { opacity: 0.65; }

        /* ══════════════════════════════
           HEADER BAR (logo + CTA)
        ══════════════════════════════ */
        #header-bar {
            background: #000;
            border-bottom: 1px solid var(--border);
            padding: 14px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .brand-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .brand-icon {
            width: 48px; height: 48px;
            background: var(--accent);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem;
            color: #000;
            box-shadow: 0 0 18px var(--accent-glow);
            font-weight: 900;
            font-family: 'Oswald', sans-serif;
        }
        .brand-name {
            font-family: 'Oswald', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            line-height: 1;
        }
        .brand-name span { color: var(--accent); }
        .brand-tagline {
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.72rem;
            font-style: italic;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .header-contact {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            font-size: 0.88rem;
        }
        .header-contact i { color: var(--accent); font-size: 1.1rem; }
        .btn-cta {
            background: var(--accent);
            color: #000;
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 24px;
            border: none;
            border-radius: 3px;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .btn-cta:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 24px var(--accent-glow);
        }

        /* ══════════════════════════════
           MAIN NAVBAR
        ══════════════════════════════ */
        #main-nav {
            background: #0d0f14;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: var(--topbar-h);
            z-index: 150;
        }
        #main-nav .nav-inner {
            display: flex;
            align-items: center;
            padding: 0 32px;
            height: var(--navbar-h);
            gap: 4px;
        }
        .nav-item-link {
            font-family: 'Oswald', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 4px;
            transition: all 0.2s ease;
            position: relative;
        }
        .nav-item-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 14px; right: 14px;
            height: 2px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }
        .nav-item-link:hover, .nav-item-link.active {
            color: #fff;
        }
        .nav-item-link:hover::after, .nav-item-link.active::after {
            transform: scaleX(1);
        }
        .nav-item-link.active { color: var(--accent); }

        /* ══════════════════════════════
           PAGE CONTENT
        ══════════════════════════════ */
        #page-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* ── Cards ── */
        .dark-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .dark-card-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .dark-card-header .header-icon {
            width: 38px; height: 38px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem;
        }
        .dark-card-header h4 {
            margin: 0;
            font-size: 1.05rem;
            font-weight: 700;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.5px;
            color: var(--text);
        }
        .dark-card-body { padding: 28px 24px; }

        /* ── Form controls ── */
        .form-label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-control, .form-select {
            background: var(--input-bg) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 6px !important;
            padding: 10px 14px !important;
            font-size: 0.9rem !important;
            transition: border-color 0.2s, box-shadow 0.2s !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 3px var(--accent-dim) !important;
            outline: none !important;
        }
        .form-control::placeholder { color: #2e3545 !important; }
        .form-select option { background: #161b22; color: var(--text); }
        .input-group-text {
            background: #13161e !important;
            border: 1px solid var(--border) !important;
            color: var(--muted) !important;
        }
        textarea.form-control { resize: vertical; min-height: 90px; }

        /* ── Buttons ── */
        .btn-accent {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 11px 24px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 4px 16px var(--accent-glow);
            cursor: pointer;
            width: 100%;
        }
        .btn-accent:hover {
            background: #fff;
            box-shadow: 0 6px 22px var(--accent-glow);
            transform: translateY(-1px);
            color: #000;
        }

        /* ── Alerts ── */
        .alert-dark-success {
            background: rgba(57,255,20,0.08);
            border: 1px solid rgba(57,255,20,0.3);
            color: var(--accent);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.88rem;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-dark-error {
            background: rgba(230,57,70,0.08);
            border: 1px solid rgba(230,57,70,0.3);
            color: #f87171;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 0.88rem;
            display: flex; align-items: center; gap: 8px;
        }
        .field-error {
            color: #f87171;
            font-size: 0.78rem;
            margin-top: 5px;
            display: flex; align-items: center; gap: 4px;
        }
        .form-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #2a3045; }

        /* ══════════════════════════════
           FEATURE PAGE — SINGLE COLUMN
        ══════════════════════════════ */

        /* Page wrapper */
        .feature-page { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

        /* Section label (like home page) */
        .fp-section-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--accent);
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 6px;
        }
        .fp-section-label::after { content:''; flex:1; height:1px; background:rgba(57,255,20,0.2); }

        /* Page title */
        .fp-title {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem; font-weight: 700;
            color: #fff; text-transform: uppercase;
            letter-spacing: -0.5px; line-height: 1.1;
            margin-bottom: 32px;
        }
        .fp-title span { color: var(--accent); }

        /* Form card */
        .fp-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 48px;
            position: relative;
        }
        .fp-card::before {
            content: '';
            position: absolute; top:0; left:0; right:0; height:3px;
            background: var(--c, var(--accent));
        }
        .fp-card-head {
            padding: 22px 28px 18px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 14px;
        }
        .fp-card-icon {
            width: 44px; height: 44px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .fp-card-head h3 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.15rem; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase;
            color: #fff; margin: 0 0 2px;
        }
        .fp-card-head p { font-size: 0.78rem; color: var(--muted); margin: 0; }
        .fp-card-body { padding: 28px; }

        /* Form label */
        .form-label {
            font-size: 0.7rem !important;
            font-weight: 600 !important;
            letter-spacing: 1.2px !important;
            text-transform: uppercase !important;
            color: var(--muted) !important;
            margin-bottom: 7px !important;
            font-family: 'Oswald', sans-serif !important;
        }

        /* Submit button — full Oswald style */
        .btn-fp-submit {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 13px 32px;
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px var(--accent-glow);
            cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px;
            animation: pulseGlow 3s ease infinite;
        }
        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 4px 20px var(--accent-glow); }
            50%      { box-shadow: 0 4px 36px rgba(57,255,20,0.55); }
        }
        .btn-fp-submit:hover { background: #fff; transform: translateY(-1px); }

        /* ══════════════════════════════
           DATA TABLE
        ══════════════════════════════ */
        .fp-table-section { margin-top: 8px; }
        .fp-table-heading {
            font-family: 'Oswald', sans-serif;
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 3px; text-transform: uppercase;
            color: var(--accent);
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 6px;
        }
        .fp-table-heading::after { content:''; flex:1; height:1px; background:rgba(57,255,20,0.2); }
        .fp-table-title {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem; font-weight: 700;
            color: #fff; text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
        }
        .fp-table-title span { color: var(--accent); }
        .count-badge {
            background: var(--accent-dim);
            color: var(--accent);
            font-size: 0.7rem;
            padding: 2px 10px;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            vertical-align: middle;
        }
        .data-table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
        }
        .data-table thead tr {
            background: var(--bg-card2);
            border-bottom: 1px solid var(--border);
        }
        .data-table thead th {
            padding: 12px 18px;
            font-family: 'Oswald', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }
        .data-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .data-table tbody tr:last-child { border-bottom: none; }
        .data-table tbody tr:hover { background: var(--bg-card2); }
        .data-table td {
            padding: 14px 18px;
            color: var(--text);
            vertical-align: middle;
        }
        .data-table td.muted { color: var(--muted); font-size: 0.82rem; }
        .btn-table-edit {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 4px;
            padding: 4px 12px;
            font-size: 0.75rem;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 5px;
        }
        .btn-table-edit:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }
        .status-badge {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 600;
            font-family: 'Oswald', sans-serif; letter-spacing: 0.5px;
        }
        .status-active   { background: rgba(57,255,20,0.1);  color: var(--accent); }
        .status-maintenance { background: rgba(245,158,11,0.1); color: #fbbf24; }
        .status-inactive { background: rgba(230,57,70,0.1);  color: #f87171; }
        .empty-state {
            text-align: center; padding: 56px 24px; color: var(--muted);
            border: 1px dashed var(--border); border-radius: 10px;
        }
        .empty-state i { font-size: 2.8rem; margin-bottom: 14px; display: block; opacity: 0.2; }
        .empty-state p { font-size: 0.85rem; }

        /* ── Footer ── */
        #site-footer {
            background: #000;
            border-top: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.78rem;
            color: var(--muted);
        }
        #site-footer span { color: var(--accent); }
    </style>
</head>
<body>

<!-- ① Utility bar -->
<div id="utility-bar">
    <div class="utility-left">
        <i class="bi bi-lightning-charge-fill"></i> TitanFlow — Train Hard. Live Strong.
    </div>
    <div class="utility-right">
        <a href="/gym_app/Member/"><i class="bi bi-person-plus me-1"></i>Register</a>
        <a href="/gym_app/"><i class="bi bi-house me-1"></i>Home</a>
    </div>
</div>

<!-- ② Header bar -->
<div id="header-bar">
    <a href="/gym_app/" class="brand-logo">
        <div class="brand-icon">T</div>
        <div>
            <div class="brand-name">Titan<span>Flow</span></div>
            <div class="brand-tagline">Train Hard. Live Strong.</div>
        </div>
    </a>
    <div class="header-contact">
        <i class="bi bi-telephone-fill"></i>
        <span>+1 (619) 837-7866</span>
    </div>
    <a href="/gym_app/Member/" class="btn-cta">
        <i class="bi bi-arrow-right me-1"></i> Get Started
    </a>
</div>

<!-- ③ Main nav -->
<nav id="main-nav">
    <div class="nav-inner">
        <a href="/gym_app/" class="nav-item-link {% block nav_home %}{% endblock %}">Home</a>
        <a href="/gym_app/Trainer/" class="nav-item-link {% block nav_trainer %}{% endblock %}">Trainers</a>
        <a href="/gym_app/Member/" class="nav-item-link {% block nav_member %}{% endblock %}">Members</a>
        <a href="/gym_app/Membership/" class="nav-item-link {% block nav_membership %}{% endblock %}">Memberships</a>
        <a href="/gym_app/Payment/" class="nav-item-link {% block nav_payment %}{% endblock %}">Payments</a>
        <a href="/gym_app/Exercise/" class="nav-item-link {% block nav_exercise %}{% endblock %}">Exercises</a>
        <a href="/gym_app/Workoutplan/" class="nav-item-link {% block nav_workout %}{% endblock %}">Workout Plans</a>
        <a href="/gym_app/Equipment/" class="nav-item-link {% block nav_equipment %}{% endblock %}">Equipment</a>
    </div>
</nav>

<!-- ④ Page content -->
<div id="page-wrap">
    {% block content %}{% endblock %}
</div>

<!-- ⑤ Footer -->
<footer id="site-footer">
    <div>&copy; 2026 <span>TitanFlow</span>. All rights reserved.</div>
    <div>Train Hard. Live Strong.</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Active nav link
    document.querySelectorAll('.nav-item-link').forEach(link => {
        if (window.location.pathname === link.getAttribute('href') ||
            (link.getAttribute('href') !== '/gym_app/' && window.location.pathname.startsWith(link.getAttribute('href')))) {
            link.classList.add('active');
        }
    });

    // Auto-dismiss alerts
    setTimeout(() => {
        document.querySelectorAll('.alert-dark-success, .alert-dark-error').forEach(el => {
            el.style.transition = 'opacity 0.5s ease';
            el.style.opacity = '0';
            setTimeout(() => el.remove(), 500);
        });
    }, 4000);
</script>
</body>
</html>
